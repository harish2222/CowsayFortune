name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        pwsh: ['7.4', '7.5']
        include:
          - os: windows-latest
            pwsh: '5.1'
    runs-on: ${{ matrix.os }}
    name: Test (PS ${{ matrix.pwsh }} on ${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell ${{ matrix.pwsh }}
        uses: pspowershell/pspowershell@v0.3
        with:
          version: ${{ matrix.pwsh }}

      - name: Install Pester
        shell: pwsh
        run: |
          if ((Get-Module -ListAvailable -Name Pester).Version.Major -lt 5) {
            Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser -MinimumVersion 5.0.0
          }

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $results = Invoke-Pester -Path ./Tests/CowsayFortune.Tests.ps1 -PassThru
          Write-Host "Tests: $($results.TotalCount) | Passed: $($results.PassedCount) | Failed: $($results.FailedCount)"
          if ($results.FailedCount -gt 0) {
            exit 1
          }

  lint:
    runs-on: ubuntu-latest
    name: PSScriptAnalyzer Lint
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./CowsayFortune -Recurse -Severity Error,Warning
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host "No lint errors found."

  release:
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CowsayFortune/**
