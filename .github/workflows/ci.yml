name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  MODULE_NAME: Forgum

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4

      - name: Cache PSScriptAnalyzer
        uses: actions/cache@v4
        with:
          path: ~/.local/share/powershell/Modules/PSScriptAnalyzer
          key: pssa-1.24

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer | Where-Object Version -ge '1.24.0')) {
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -MinimumVersion 1.24.0
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $excludedRules = @(
            'PSReviewUnusedParameter'
            'PSAvoidUsingWriteHost'
            'PSUseSingularNouns'
            'PSUseBOMForUnicodeEncodedFile'
          )
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning -ExcludeRule $excludedRules
          if ($results) {
            Write-Host "Found $($results.Count) issue(s):" -ForegroundColor Red
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
            exit 1
          }
          Write-Host "No lint errors found." -ForegroundColor Green

  validate:
    runs-on: ubuntu-latest
    name: Validate Module
    steps:
      - uses: actions/checkout@v4

      - name: Validate module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path ./${{ env.MODULE_NAME }}.psd1 -ErrorAction Stop
          Write-Host "Module: $($manifest.Name) v$($manifest.Version)"
          Write-Host "Author: $($manifest.Author)"
          Write-Host "Exports: $($manifest.ExportedFunctions.Keys -join ', ')"
          $expected = @('Invoke-Cowsay', 'Invoke-Forgum', 'Get-Fortune', 'Get-CFCow', 'Get-CFConfig', 'Set-CFConfig', 'Show-CFAnimation')
          $actual = $manifest.ExportedFunctions.Keys
          $missing = $expected | Where-Object { $_ -notin $actual }
          if ($missing) {
            Write-Host "Missing exports: $($missing -join ', ')" -ForegroundColor Red
            exit 1
          }
          Write-Host "All 7 expected functions exported." -ForegroundColor Green

      - name: Verify data files
        shell: pwsh
        run: |
          $cowCount = (Get-ChildItem ./Data/Cows/*.cow).Count
          Write-Host "Cow files: $cowCount"
          if ($cowCount -lt 50) {
            Write-Host "Expected at least 50 cow files" -ForegroundColor Red
            exit 1
          }
          $fortuneRaw = Get-Content ./Data/Fortunes/fortunes.txt -Raw
          $fortuneCount = ($fortuneRaw -split '%').Count
          Write-Host "Fortune entries: $fortuneCount"
          if ($fortuneCount -lt 1000) {
            Write-Host "Expected at least 1000 fortune entries" -ForegroundColor Red
            exit 1
          }
          Write-Host "Data files verified." -ForegroundColor Green

      - name: Verify animation files
        shell: pwsh
        run: |
          $animFiles = Get-ChildItem ./Private/Animation/*.ps1 -ErrorAction SilentlyContinue
          Write-Host "Animation files: $($animFiles.Count)"
          if ($animFiles.Count -lt 11) {
            Write-Host "Expected at least 11 animation files (3 original + 8 new)" -ForegroundColor Red
            exit 1
          }
          $expected = @('Static', 'Talking', 'Typewriter', 'SlideIn', 'Bounce', 'Dissolve', 'FadeIn', 'Blink', 'Wiggle', 'Wave', 'Disco')
          foreach ($name in $expected) {
            $found = $animFiles | Where-Object { $_.BaseName -eq $name }
            if (-not $found) {
              Write-Host "Missing animation: $name" -ForegroundColor Red
              exit 1
            }
          }
          Write-Host "All 11 animation files present." -ForegroundColor Green

  test:
    needs: [lint, validate]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        pwsh: ['7.4']
        include:
          - os: windows-latest
            pwsh: '5.1'
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }} pwsh ${{ matrix.pwsh }})
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell ${{ matrix.pwsh }}
        uses: actions/setup-powershell@v2
        if: matrix.pwsh != '5.1'
        with:
          version: ${{ matrix.pwsh }}

      - name: Cache Pester
        uses: actions/cache@v4
        with:
          path: ~/.local/share/powershell/Modules/Pester
          key: pester-5.7

      - name: Install Pester 5
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version.Major -ge 5 })) {
            Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser -MinimumVersion 5.7.0 -MaximumVersion 5.99.99
          }
          Get-Module -ListAvailable -Name Pester | Where-Object Version.Major -ge 5 | Select-Object Name, Version | Format-Table -AutoSize

      - name: Run Pester Tests
        shell: pwsh
        env:
          FORGUM_NOAUTOSTART: '1'
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './Tests'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.Run.TestResult = $true
          $config.Run.TestResultOutputFormat = 'NUnitXml'
          $config.Run.TestResultPath =Join-Path $env:RUNNER_TEMP 'test-results.xml'
          $config.Run.Timeout = 300
          $results = Invoke-Pester -Configuration $config
          Write-Host ""
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Tests: $($results.TotalCount) | Passed: $($results.PassedCount) | Failed: $($results.FailedCount) | Skipped: $($results.SkippedCount)" -ForegroundColor Cyan
          Write-Host "Duration: $($results.Duration)" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          if ($results.FailedCount -gt 0) {
            $results.TestResult | Where-Object Result -eq 'Failed' | ForEach-Object {
              Write-Host ""
              Write-Host "FAILED: $($_.Name)" -ForegroundColor Red
              Write-Host "  Error: $($_.ErrorRecord.DisplayErrorMessage)" -ForegroundColor Red
              if ($($_.ErrorRecord.DisplayErrorStackTrace)) {
                Write-Host "  Stack: $($_.ErrorRecord.DisplayErrorStackTrace)" -ForegroundColor DarkRed
              }
            }
            exit 1
          }

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-pwsh${{ matrix.pwsh }}
          path: ${{ runner.temp }}/test-results.xml

  build:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Build Package
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release package
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.tag }}'
          $stagingDir = Join-Path $env:RUNNER_TEMP "Forgum-v$version"
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          # Copy module files
          Copy-Item -Path "./${{ env.MODULE_NAME }}.psd1" -Destination $stagingDir
          Copy-Item -Path "./${{ env.MODULE_NAME }}.psm1" -Destination $stagingDir
          Copy-Item -Path "./Private" -Destination $stagingDir -Recurse
          Copy-Item -Path "./Public" -Destination $stagingDir -Recurse
          Copy-Item -Path "./Data" -Destination $stagingDir -Recurse
          Copy-Item -Path "./LICENSE" -Destination $stagingDir
          Copy-Item -Path "./README.md" -Destination $stagingDir
          Copy-Item -Path "./install.ps1" -Destination $stagingDir
          Copy-Item -Path "./install.sh" -Destination $stagingDir
          Copy-Item -Path "./uninstall.ps1" -Destination $stagingDir

          # Create zip
          $zipPath = Join-Path $env:RUNNER_TEMP "Forgum-v$version.zip"
          Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipPath -Force

          # Verify zip contents
          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          $entries = $zip.Entries.Count
          $zip.Dispose()
          Write-Host "Package created: $zipPath ($entries files)"

          # Verify key files exist in zip
          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          $entryNames = $zip.Entries | ForEach-Object { $_.FullName }
          $zip.Dispose()
          $required = @('Forgum.psd1', 'Forgum.psm1', 'Private/', 'Public/', 'Data/')
          foreach ($r in $required) {
            $found = $entryNames | Where-Object { $_ -like "*$r*" }
            if (-not $found) {
              Write-Host "Missing in package: $r" -ForegroundColor Red
              exit 1
            }
          }
          Write-Host "Package contents verified."

          # Copy to artifact location
          Copy-Item $zipPath ./Forgum-v$version.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Forgum-v${{ steps.version.outputs.tag }}
          path: Forgum-v*.zip

  build-installer:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    name: Build Installer (Inno Setup)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            Write-Host "Inno Setup found at: $iscc"
          } else {
            Write-Host "Inno Setup not found, checking alternatives..."
            Get-ChildItem "C:\Program Files*\Inno Setup*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          }

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $script = "installer\Forgum.iss"

          # Update version in script
          $version = '${{ steps.version.outputs.tag }}'
          $content = Get-Content $script -Raw
          $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`""
          Set-Content $script $content

          # Compile
          & "$iscc" "$script"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Inno Setup compilation failed with exit code $LASTEXITCODE" -ForegroundColor Red
            exit 1
          }

          $installer = "dist\Forgum-v$version-Setup.exe"
          if (Test-Path $installer) {
            $size = (Get-Item $installer).Length / 1MB
            Write-Host "Installer created: $installer ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Host "Installer not found at expected path" -ForegroundColor Red
            exit 1
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Forgum-v${{ steps.version.outputs.tag }}-Setup
          path: dist/Forgum-v*-Setup.exe

  release:
    needs: [build, build-installer]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Forgum-v${{ steps.version.outputs.tag }}

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: Forgum-v${{ steps.version.outputs.tag }}-Setup
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Forgum v${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: |
            Forgum-v*.zip
            dist/Forgum-v*-Setup.exe
